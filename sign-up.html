<!--=============================
=            Sign Up            =
==============================-->

<section class="user-login section">
	<div class="container">
		<div class="row">
			<div class="col-12">
				<div class="block">
					<!-- Content -->
					<div class="content text-center">
						<div class="logo">
							<a href="index.html"><img src="images/logo.png" alt=""></a>
						</div>
						<div class="title-text">
							<h3>Registrarse como usuario nuevo</h3>
						</div>
						<form action="#">
							<!-- Username -->
							<input class="form-control main" type="text" placeholder="Nombre de usuario">
							<!-- Email -->
							<input class="form-control main" type="email" placeholder="Correo Electrónico">
							<!-- Password -->
							<input class="form-control main" type="password" placeholder="Password">
							<!-- Submit Button -->
							<button class="btn btn-main-md">Registrar</button>
						</form>
						<div class="new-acount">
							<p>Al hacer click “Registrar” acepto los <a href="privacy-policy.html">Términos y condiciones.</a></p>
							<p>¿Ya tiene una cuenta?  <a href="sign-in.html">Login</a></p>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
</section>

<!--====  End of Sign Up  ====-->
